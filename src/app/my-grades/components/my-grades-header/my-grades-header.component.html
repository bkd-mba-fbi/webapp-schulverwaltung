<div class="d-flex justify-content-between header">
  <div>{{ "my-grades.header" | translate }}</div>
  <bkd-student-grades-actions
    [reports]="(myGradesService.testReports$ | async) ?? []"
  ></bkd-student-grades-actions>
</div>
<bkd-events-scope-select
  class="mb-3"
  [value]="myGradesService.scope$ | async"
  (valueChange)="myGradesService.setScope($event)"
></bkd-events-scope-select>
