<div class="d-flex flex-column">
  <bkd-backlink class="mb-2" [link]="'../..'" [params]="backlinkQueryParams()">
    @switch (dossierPage()) {
      @case ("grades") {
        <bkd-student-grades-actions
          [reports]="reports()"
        ></bkd-student-grades-actions>
      }
      @case ("dossier") {
        <bkd-student-dossier-actions></bkd-student-dossier-actions>
      }
    }
  </bkd-backlink>
  <div class="d-flex align-items-start justify-content-center dossier-content">
    <bkd-student-navigation
      [studentId]="studentId()"
      [student]="student()"
      [returnParams]="returnParams()"
    ></bkd-student-navigation>
    <div class="flex-fill d-flex flex-column" role="tabpanel">
      <h1>{{ "student." + dossierPage() + ".title" | translate }}</h1>
      @if (!loading() && !student()) {
        <p>{{ "shared.profile.no-profile" | translate }}</p>
      } @else {
        <router-outlet></router-outlet>
      }
    </div>
  </div>
</div>
