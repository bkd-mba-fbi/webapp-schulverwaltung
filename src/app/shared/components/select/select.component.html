<select
  [id]="id()"
  class="form-select"
  [class.is-invalid]="isInvalid()"
  tabindex="{{ tabindex() }}"
  [ngStyle]="{ width: width() }"
  [disabled]="disabled()"
  [ngModel]="selectedOption()"
  (ngModelChange)="value.set($event && $event.Key)"
>
  @if (allowEmpty()) {
    <option [ngValue]="null">
      {{ emptyLabel() | translate }}
    </option>
  }
  @for (option of options(); track option.Key) {
    <option [ngValue]="option">
      {{ option.Value }}
    </option>
  }
  >
</select>
