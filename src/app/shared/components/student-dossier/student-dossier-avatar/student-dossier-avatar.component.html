<bkd-avatar [studentId]="studentId()" class="me-3 medium"></bkd-avatar>
<div class="d-flex flex-column overflow-hidden">
  <div class="student-name">{{ student()?.FullName }}</div>
  @if (student()) {
    <div class="additional-info">
      <div>
        {{ student()?.Birthdate | date: "dd.MM.yyyy" }}
        ({{ student()?.Gender }})
      </div>
      @if (studyClassesLabel()) {
        <div class="study-classes">{{ studyClassesLabel() }}</div>
      }
    </div>
  }
</div>
