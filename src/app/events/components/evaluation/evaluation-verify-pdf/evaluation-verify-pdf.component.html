<div class="actions">
  <div class="actions-slot"><ng-content></ng-content></div>
  <div class="d-flex gap-1">
    <button
      class="btn btn-primary btn-icon"
      [disabled]="loading()"
      (click)="print()"
    >
      <i class="material-icons">print</i>
    </button>
    <button
      class="btn btn-primary btn-icon"
      [disabled]="loading()"
      (click)="download()"
    >
      <i class="material-icons">download</i>
    </button>
  </div>
</div>
<div id="evaluation-verify-pdf" [class.hidden]="loading()"></div>
@if (loading()) {
  <bkd-spinner></bkd-spinner>
}
