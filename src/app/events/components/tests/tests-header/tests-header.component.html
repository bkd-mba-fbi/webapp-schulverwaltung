<bkd-backlink [link]="['/events']">
  <div class="d-flex gap-2">
    <a routerLink="add" class="edit btn btn-primary btn-icon">
      <i class="material-icons">add</i>
    </a>
    <bkd-reports-link [reports]="reports$ | async"> ></bkd-reports-link>
    <!--Element id excel-import used for a external modul MasterExcel-->
    <div id="excel-import"></div>
  </div>
</bkd-backlink>

<div class="d-flex flex-column header">
  <h1>{{ getDesignation() }}</h1>
  @if (course.Participants) {
    <div class="additional-info">
      {{
        (course.Participants.length === 1
          ? "courses.registration"
          : "courses.registrations"
        ) | translate: { count: course.Participants.length }
      }}
    </div>
  }
</div>
