<div class="d-flex flex-column h-100 justify-content-between">
  <div
    (click)="toggleHeader()"
    class="test-designation d-flex flex-row my-3 align-items-end justify-content-between"
    role="button"
  >
    <div [ngClass]="expanded ? 'expanded' : 'collapsed'">
      {{ test.Designation }}
    </div>
    <i class="material-icons align-self-start">{{
      expanded ? 'expand_more' : 'expand_less'
    }}</i>
  </div>
  <div class="d-flex flex-column">
    <div *ngIf="expanded" class="d-flex flex-column mb-3">
      <div class="d-flex flex-row justify-content-between">
        <div>{{ test.Date | date: 'dd.MM.yyyy' }}</div>
        <a class="btn btn-link p-0 edit">
          <i
            *ngIf="test.IsOwner && test.IsPublished === false"
            class="material-icons"
            >edit</i
          >
        </a>
      </div>
      <div>
        {{ test | testSummaryShort }}
      </div>
      <div class="test-owner">{{ test.Owner }}</div>
    </div>
    <div class="d-flex align-items-center justify-content-between test-status">
      <erz-test-state [published]="test.IsPublished"></erz-test-state>
      <i
        class="material-icons expand-mobile"
        (click)="toggleHeader()"
        role="button"
        >{{ expanded ? 'expand_more' : 'expand_less' }}</i
      >
    </div>
  </div>
</div>
