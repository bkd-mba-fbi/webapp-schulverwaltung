name: SBOM

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  bom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5

      - name: Read Node.js version from .node-version
        run: echo "NODE_VERSION=$(cat .node-version)" >> $GITHUB_OUTPUT
        id: node-version

      - uses: pnpm/action-setup@v6

      - name: Use Node.js ${{ steps.node-version.outputs.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ steps.node-version.outputs.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate BOM
        run: pnpm sbom --sbom-format cyclonedx --sbom-type application --sbom-spec-version 1.6 > bom.json

      - name: Push BOM to Dependency Track
        env:
          PROJECT_NAME: bkd-webapp-schulverwaltung
        run: |
          curl --verbose -s --location --request POST ${{vars.DEPENDENCY_TRACK_URL}}/api/v1/bom \
               --header "X-Api-Key: ${{secrets.DEPENDENCY_TRACK_API_KEY}}" \
               --header "Content-Type: multipart/form-data" \
               --form "autoCreate=true" \
               --form "projectName=$PROJECT_NAME" \
               --form "projectVersion=latest" \
               --form "bom=@bom.json"
